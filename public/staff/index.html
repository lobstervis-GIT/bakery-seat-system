<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>員工後台 - 座位管理</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; }.header { background: #8B4513; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }.header h1 { font-size: 1.2rem; }.container { max-width: 800px; margin: 0 auto; padding: 16px; }.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }.stat-card { background: white; border-radius: 8px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }.stat-card .value { font-size: 2rem; font-weight: 700; color: #8B4513; }.stat-card .label { font-size: 0.85rem; color: #666; margin-top: 4px; }.seat-bar { background: white; border-radius: 8px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }.seat-bar h2 { font-size: 1rem; margin-bottom: 12px; }.seats { display: flex; flex-wrap: wrap; gap: 6px; }.seat { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; }.seat-free { background: #D4EDDA; color: #155724; }.seat-occupied { background: #F8D7DA; color: #721C24; }.actions { display: flex; gap: 8px; margin-bottom: 16px; }.btn { padding: 10px 16px; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }.btn-add { background: #8B4513; color: white; }.btn-refresh { background: white; border: 1px solid #ddd; color: #333; }.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }.modal { background: white; border-radius: 12px; padding: 24px; width: 90%; max-width: 400px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }.modal h3 { margin-bottom: 16px; }.form-row { margin-bottom: 12px; }.form-row label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }.form-row input, .form-row select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }.segments-list { margin-top: 12px; }.segment-option { background: #f8f9fa; border: 2px solid #ddd; border-radius: 8px; padding: 10px; margin: 6px 0; cursor: pointer; }.segment-option:hover { border-color: #8B4513; }.segment-option.selected { border-color: #8B4513; background: #FFF8F0; }</style></head><body><div class="header"><h1>座位管理</h1><span id="clock"></span></div><div class="container"><div class="stats"><div class="stat-card"><div class="value" id="occupied">-</div><div class="label">使用中</div></div><div class="stat-card"><div class="value" id="total">-</div><div class="label">總座位</div></div><div class="stat-card"><div class="value" id="takeout">-</div><div class="label">待處理外帶</div></div></div><div class="actions"><button class="btn btn-add" onclick="openModal()">+ 新增入座</button><button class="btn btn-refresh" onclick="loadDashboard()">重新整理</button></div><div class="seat-bar"><h2>座位總覽</h2><div class="seats" id="seat-bar"></div></div></div><div class="modal-overlay" id="modal"><div class="modal"><h3>新增入座</h3><div class="form-row"><label>顧客名稱</label><input type="text" id="m-label" placeholder="王先生一行"></div><div class="form-row"><label>人數</label><input type="number" id="m-party" min="1" max="20" value="2"></div><div class="form-row"><label>預估時長</label><select id="m-duration"><option value="60">1 小時</option><option value="90">1.5 小時</option><option value="120" selected>2 小時</option><option value="150">2.5 小時</option><option value="180">3 小時</option></select></div><div id="segments" class="segments-list"></div><div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-add" style="flex:1" onclick="suggestSegments()">查詢可用區段</button><button class="btn btn-refresh" style="flex:1" onclick="closeModal()">取消</button></div></div></div><script>function updateClock() {document.getElementById("clock").textContent = new Date().toLocaleTimeString("zh-TW");}setInterval(updateClock, 1000);updateClock();async function loadDashboard() {try {const resp = await fetch("/api/staff/dashboard");const data = await resp.json();document.getElementById("occupied").textContent = data.occupied_seats;document.getElementById("total").textContent = data.total_seats;document.getElementById("takeout").textContent = data.pending_takeout_count || 0;renderSeatBar(data.occupied_seats, data.total_seats);} catch (e) { console.error(e); }}function renderSeatBar(occupied, total) {const el = document.getElementById("seat-bar");let html = "";for (let i = 1; i <= total; i++) {const cls = i <= occupied ? "seat-occupied" : "seat-free";html += '<div class="seat ' + cls + '">' + i + "</div>";}el.innerHTML = html;}function openModal() { document.getElementById("modal").style.display = "block";}function closeModal() {document.getElementById("modal").style.display = "none";document.getElementById("segments").innerHTML = "";}async function suggestSegments() {const party = parseInt(document.getElementById("m-party").value);const duration = parseInt(document.getElementById("m-duration").value);const startTime = new Date().toISOString();try {const resp = await fetch("/api/staff/stays/suggest-segments", {method: "POST",headers: { "Content-Type": "application/json" },body: JSON.stringify({ party_size: party, start_time: startTime, duration_minutes: duration }),});const data = await resp.json();renderSegments(data);} catch (e) { console.error(e); }}function renderSegments(data) {const el = document.getElementById("segments");if (!data.segments || data.segments.length === 0) {el.innerHTML = '<p style="color:#721C24">沒有可用的連續座位區段</p>';return;}el.innerHTML = '<p style="margin-bottom:8px">需要 ' + data.total_seats_needed + ' 席 (' + data.party_size + ' 人 + ' + data.buffer + ' buffer)</p>' +data.segments.slice(0, 5).map(function(seg, i) {return '<div class="segment-option" onclick="selectSegment(this)">'+'座位 ' + seg.start_position + '-' + seg.end_position+';</div>';}).join("");}function selectSegment(el) {document.querySelectorAll(".segment-option").forEach(function(e) { e.classList.remove("selected"); });el.classList.add("selected");}loadDashboard();setInterval(loadDashboard, 30000);</script></body></html>
