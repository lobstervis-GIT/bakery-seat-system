<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>烘焙 DIY 工坊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FFF8F0; color: #333; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }
    header { text-align: center; padding: 32px 0; }
    header h1 { font-size: 1.8rem; color: #8B4513; }
    header p { color: #A0522D; margin-top: 8px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 1.1rem; color: #8B4513; margin-bottom: 12px; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; }
    .status-low { background: #D4EDDA; color: #155724; }
    .status-medium { background: #FFF3CD; color: #856404; }
    .status-high { background: #F8D7DA; color: #721C24; }
    .info-list { list-style: none; }
    .info-list li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .info-list li:last-child { border-bottom: none; }
    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; margin: 8px 0; }
    .btn-primary { background: #8B4513; color: white; }
    .btn-outline { background: white; color: #8B4513; border: 2px solid #8B4513; }
    .loading { color: #999; text-align: center; padding: 20px; }
    footer { text-align: center; padding: 24px; color: #999; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>烘焙 DIY 工坊</h1>
      <p>手作烘焙體驗，享受甜蜜時光</p>
    </header>
    <div class="card">
      <h2>目前店內狀態</h2>
      <div id="status-container"><p class="loading">載入中...</p></div>
    </div>
    <div class="card">
      <h2>體驗須知</h2>
      <ul class="info-list" id="rules-list"><li class="loading">載入中...</li></ul>
    </div>
    <a href="/takeout" class="btn btn-primary">外帶訂購</a>
    <a href="tel:02-1234-5678" class="btn btn-outline">電話聯繫</a>
    <footer>
      <p>營業時間：10:00 - 20:00 (週一公休)</p>
    </footer>
  </div>
  <script>
    async function loadStatus() {
      try {
        const resp = await fetch("/api/public/status");
        const data = await resp.json();
        const el = document.getElementById("status-container");
        const m = { low: ["充裕", "status-low"], medium: ["適中", "status-medium"], high: ["忙碌", "status-high"] };
        const [label, cls] = m[data.busy_level] || ["未知", ""];
        el.innerHTML = '<p><span class="status-badge ' + cls + '">' + label + '</span> ' + data.occupied_seats + '/' + data.total_seats + ' 席使用中</p><p style="margin-top:8px;color:#666;font-size:0.9rem">' + data.suggestion + '</p>';
      } catch { document.getElementById("status-container").innerHTML = "<p>無法載入</p>"; }
    }
    async function loadRules() {
      try {
        const resp = await fetch("/api/public/rules");
        const data = await resp.json();
        const el = document.getElementById("rules-list");
        el.innerHTML = '<li>平均體驗時間：約 ' + data.average_duration_hours + ' 小時</li><li>' + data.group_suggestion + '</li><li>遲到處理：' + data.late_policy + '</li>';
      } catch { document.getElementById("rules-list").innerHTML = "<li>無法載入</li>"; }
    }
    loadStatus();
    loadRules();
    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
