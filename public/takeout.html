<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外帶訂購 - 烘焙 DIY 工坊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FFF8F0; color: #333; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }
    header { text-align: center; padding: 24px 0; }
    header h1 { font-size: 1.5rem; color: #8B4513; }
    .form-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #555; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    .form-group textarea { height: 80px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #8B4513; }
    .btn-submit { display: block; width: 100%; padding: 14px; background: #8B4513; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-submit:disabled { background: #ccc; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: #8B4513; text-decoration: none; }
    .success-msg { background: #D4EDDA; color: #155724; padding: 16px; border-radius: 8px; text-align: center; display: none; }
    .error-msg { background: #F8D7DA; color: #721C24; padding: 16px; border-radius: 8px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>外帶訂購</h1>
    </header>

    <div id="success" class="success-msg">訂單已送出！我們會盡快準備。</div>
    <div id="error" class="error-msg"></div>

    <form id="takeout-form" class="form-card">
      <div class="form-group">
        <label for="name">姓名 *</label>
        <input type="text" id="name" required placeholder="請輸入姓名">
      </div>
      <div class="form-group">
        <label for="phone">聯絡電話</label>
        <input type="tel" id="phone" placeholder="09xx-xxx-xxx">
      </div>
      <div class="form-group">
        <label for="pickup">預計取貨時間</label>
        <input type="datetime-local" id="pickup">
      </div>
      <div class="form-group">
        <label for="items">品項與需求 *</label>
        <textarea id="items" required placeholder="請描述您要的品項、數量等"></textarea>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">送出訂單</button>
    </form>

    <a href="/" class="back-link">返回首頁</a>
  </div>

  <script>
    document.getElementById("takeout-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "送出中...";
      try {
        const resp = await fetch("/api/public/takeout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            customer_name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            pickup_time: document.getElementById("pickup").value,
            item_note: document.getElementById("items").value,
          }),
        });
        if (resp.ok) {
          document.getElementById("success").style.display = "block";
          document.getElementById("takeout-form").style.display = "none";
        } else {
          const data = await resp.json();
          throw new Error(data.error || "送出失敗");
        }
      } catch (err) {
        const errEl = document.getElementById("error");
        errEl.textContent = err.message;
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "送出訂單";
      }
    });
  </script>
</body>
</html>
